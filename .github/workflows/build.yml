name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Run Tests
        run: go test -v ./...

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          VERSION=$(cat VERSION)
          GOOS=linux GOARCH=${{ matrix.arch }} go build -ldflags="-X 'main.Version=$VERSION'" -o ollama-symlinks-linux-${{ matrix.arch }} ./cmd/ollama-symlinks
          echo "ollama-symlinks-linux-${{ matrix.arch }}=$VERSION" >> $GITHUB_OUTPUT

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: |
          VERSION=$(cat VERSION)
          GOOS=darwin GOARCH=${{ matrix.arch }} go build -ldflags="-X 'main.Version=$VERSION'" -o ollama-symlinks-macos-${{ matrix.arch }} ./cmd/ollama-symlinks
          codesign --force --deep --sign - ollama-symlinks-macos-${{ matrix.arch }}
          echo "ollama-symlinks-macos-${{ matrix.arch }}=$VERSION" >> $GITHUB_OUTPUT

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: |
          $version = Get-Content -Path VERSION
          $env:VERSION = $version
          go build -ldflags="-X 'main.Version=$env:VERSION'" -o ollama-symlinks-windows-${{ matrix.arch }}.exe ./cmd/ollama-symlinks
          echo "ollama-symlinks-windows-${{ matrix.arch }}=$env:VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ollama-symlinks-*
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Generate checksums
        run: |
          find . -name "ollama-symlinks-*" -type f -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Read VERSION file
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            Release of ollama-symlinks version ${{ steps.version.outputs.VERSION }}

            ## 🚀 Installation

            ### Linux & macOS (Quick Install)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ### Windows
            Download the appropriate `.exe` file for your architecture from the releases section below.

            ## 🗑️ Uninstallation
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/uninstall.sh | bash
            ```

            ## 📖 Usage
            ```bash
            ollama-symlinks --help
            ollama-symlinks --version
            ```
          files: |
            binaries-ubuntu-latest-amd64/ollama-symlinks-linux-amd64
            binaries-ubuntu-latest-arm64/ollama-symlinks-linux-arm64
            binaries-macos-latest-amd64/ollama-symlinks-macos-amd64
            binaries-macos-latest-arm64/ollama-symlinks-macos-arm64
            binaries-windows-latest-amd64/ollama-symlinks-windows-amd64.exe
            binaries-windows-latest-arm64/ollama-symlinks-windows-arm64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
